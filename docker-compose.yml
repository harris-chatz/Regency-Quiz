name: regency-quiz

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM (Laravel 11)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    image: regency-quiz/app:dev
    container_name: rq-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      PHP_IDE_CONFIG: "serverName=regency-quiz"
    networks:
      - regency
    depends_on:
      - sqlite-web

  # ---------------------------------------------------------------------------
  # Nginx (serves Laravel public/)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: rq-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - regency
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # Vue 3 dev server (Vite)
  # ---------------------------------------------------------------------------
  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    image: regency-quiz/node:dev
    container_name: rq-node
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: "http://localhost:8080/api"
    networks:
      - regency

  # ---------------------------------------------------------------------------
  # SQLite Web UI (read & inspect schema/data in the browser)
  # https://github.com/coleifer/sqlite-web
  # ---------------------------------------------------------------------------
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: rq-sqlite-web
    command: >
      sqlite_web -H 0.0.0.0 -x /data/database.sqlite
    ports:
      - "8081:8080"
    volumes:
      - ./backend/database:/data
    networks:
      - regency

networks:
  regency:
    driver: bridge

volumes:
  frontend_node_modules:
