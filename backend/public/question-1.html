  <body>
    <div class="wipe-overlay">
      <div class="logo-image">
        <img src="./assets/images/game_blue.svg" alt="" />

    </div>
    <div class="wrapper" data-barba="wrapper">
      <div
        class="container"
        data-barba="container"
        data-barba-namespace="question-1"
      >
        <div class="question-content middle-align container-animations">
          <div class="main-image">
            <img src="./assets/images/img-q1.png" alt="" class="main" />
          </div>
          <div class="logo-image">
            <img src="./assets/images/game_adrenline.svg" alt="" />
          </div>
          <div class="question">
            <h3 class="title">Ποιο είναι το αγαπημένο σου χρώμα;</h3>
            <ul class="answers flex col">
              <li class="answer verde">Πράσινο</li>
              <li class="answer giallo">Κίτρινο</li>
              <li class="answer rosa">Ροζ</li>
            </ul>
          </div>
        </div>
        <footer class="container-footer flex">
          <div class="icon">
            <img
              src="./assets/images/regency-logo.svg"
              alt="regency logo"
              width="100"
            />
          </div>
          <div class="icon">
            <img src="./assets/images/eope-logo.svg" alt="eopae logo" />
          </div>
        </footer>
      </div>
    </div>

      <div class="footer-wrapper flex">
        <div class="footer-logo">
          <img
            src="./assets/images/eeep-logo.png"
            alt="eeep logo"
            class="desk"
          />
          <img
            src="./assets/images/eeep-logo-mob.png"

          <span> | ΕΟΠΑΕ – ΓΡΑΜΜΗ ΣΥΜΒΟΥΛΕΥΤΙΚΗΣ: 1114</span> | ΠΑΙΞΕ ΥΠΕΥΘΥΝΑ
